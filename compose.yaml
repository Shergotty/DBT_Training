services :
    postgres_target:
        image: postgres:latest
        ports:
            - ${PORT}:${PORT}
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - postgres_data:/var/lib/postgresql
        healthcheck:
              test:
                [
                  "CMD",
                  "pg_isready",
                  "-d",
                  "${POSTGRES_DB}",
                  "-h",
                  "localhost",
                  "-p",
                  "${PORT}",
                  "-U",
                  "${POSTGRES_USER}",
                ]
              interval: 5s
              timeout: 5s
              retries: 5

    dbt_python:
        build:
            context: .
            dockerfile: Dockerfile
        volumes:
            - .:/usr/app
        environment:
            POSTGRES_HOST: postgres_target
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_PORT: ${PORT}
            DBT_PROFILES_DIR: /usr/app
        depends_on:
            postgres_target:
                condition: service_healthy

volumes:
    postgres_data:
