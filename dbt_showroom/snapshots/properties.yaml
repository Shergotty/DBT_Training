snapshots:
  - name: snapshot_staging_claim
    relation: source('staing_claim')
    config:
      unique_key: HASH_CLAIM
      check_cols:
        - HASH_DIFF
      strategy: check
      updated_at: updated_at
      dbt_valid_to_current: "to_date('9999-12-31')" # Specifies that current records should have `dbt_valid_to` set to `'9999-12-31'` instead of `NULL`.
  - name: snapshot_staging_client
    relation: source('staging_client')
    config:
      unique_key: HASH_CLAIM
      check_cols:
        - HASH_DIFF
      strategy: check
      updated_at: updated_at
      dbt_valid_to_current: "to_date('9999-12-31')" # Specifies that current records should have `dbt_valid_to` set to `'9999-12-31'` instead of `NULL`.

  - name: snapshot_staging_contract
    relation: source('staging_contract')
    config:
      unique_key: HASH_CLAIM
      check_cols:
        - HASH_DIFF
      strategy: check
      updated_at: updated_at
      dbt_valid_to_current: "to_date('9999-12-31')" # Specifies that current records should have `dbt_valid_to` set to `'9999-12-31'` instead of `NULL`.
