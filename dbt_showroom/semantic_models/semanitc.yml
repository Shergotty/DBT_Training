semantic_models:
  - name: count_claim_sum_amount_per type
    description: |
      A model to aggregate all claim amounts per claim type
    model: ref('fact_claim')
    defaults:
      agg_time_dimension: metric_time
    entities: 
      - name: CLAIM_TYPE_PK
        type: foreign
      - name: dim_claim_type
        type: primary
        expr: CLAIM_TYPE_PK
    measures: 
      - name: sum_claim_per_type
        agg: sum